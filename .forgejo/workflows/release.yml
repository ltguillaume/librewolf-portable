name: Release

on: [workflow_dispatch]

env:
  app_file: LibreWolf-Portable
  app_name: LibreWolf Portable

jobs:
  release:
    runs-on: codeberg-small
    container:
      image: scottyhardy/docker-wine:stable
    steps:
      - name: Set up dependencies
        run: |
          wget https://pkg.ossign.org/debian/repository.key -O /etc/apt/keyrings/ossign.asc -q
          echo "deb [signed-by=/etc/apt/keyrings/ossign.asc] https://pkg.ossign.org/debian all main" | tee /etc/apt/sources.list.d/ossign.list
          sudo apt-get update
          sudo apt-get install -y nodejs zip ossign

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Ahk2Exe
        run: |
          wget -qO ahk.zip https://github.com/AutoHotkey/AutoHotkey/releases/download/v1.1.37.02/AutoHotkey_1.1.37.02.zip
          echo "6f3663f7cdd25063c8c8728f5d9b07813ced8780522fd1f124ba539e2854215f ahk.zip" | sha256sum -c || exit 1
          unzip ahk.zip Compiler/*
          rm ahk.zip

      - name: Set up Resource Hacker
        run: |
          wget -qO rh.zip https://www.angusj.com/resourcehacker/resource_hacker.zip
          unzip rh.zip ResourceHacker.exe -d Compiler
          rm rh.zip

      - name: Build executable
        run: |
          xvfb-run wine Compiler/Ahk2Exe.exe /in ${{ env.APP_FILE }}.ahk

      - name: Sign executable with OSSign
        if: ${{ secrets.OSSIGN_CONFIG != '' }}
        env:
          OSSIGN_CONFIG: ${{ secrets.OSSIGN_CONFIG }}
        run: |
          ossign -t pecoff -o ${{ env.APP_FILE }}.exe ${{ env.APP_FILE }}.exe

      - id: virustotal
        name: Scan with VirusTotal
        uses: https://github.com/crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./${{ env.APP_FILE }}.exe

      - name: Get VirusTotal URL
        env:
          ANALYSIS: ${{ steps.virustotal.outputs.analysis }}
        run: |
          VT_URL=$(echo "${ANALYSIS}" | grep -oP ".*exe=\K.*")
          echo "VT_URL=${VT_URL}" >> $GITHUB_ENV

      - name: Create zip
        run: |
          APP_VERSION=$(grep -oP "SetFileVersion \K[\d.]+" ${{ env.APP_FILE }}.ahk)
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          mkdir ./dist
          zip ./dist/${{ env.APP_FILE }}_${APP_VERSION}.zip ${{ env.APP_FILE }}.exe ${{ env.APP_FILE }}.url

      - name: Upload artifacts
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          path: |
            dist/${{ env.APP_FILE }}*.zip
          retention-days: 7

      - name: Generate checksums
        run: |
          cd dist
          for file in *; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Create Release
        uses: actions/forgejo-release@v2.11.3
        with:
          direction: upload
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
          token: ${{ secrets.FORGE_TOKEN }}
          tag: ${{ env.APP_VERSION }}
          title: ${{ env.APP_NAME }} ${{ env.APP_VERSION }}
          override: true
          prerelease: true
          release-dir: dist
          release-notes: |
            - [x] 
            
            > [!NOTE]
            > The release zip is signed and can be verified using GPG ([instructions](https://codeberg.org/ltguillaume/resources/src/branch/main/signing)).
            > [Link to VirusTotal Report](${{ env.VT_URL }})
            
            > [!CAUTION]
            > Some antivirus software might mark this as malware. [This is a false positive](https://www.autohotkey.com/docs/v1/FAQ.htm#Virus). Please report the program as safe if possible.
            > <details><summary>Known problematic vendors</summary><em>Arctic Wolf, DeepInstinct, Gridinsoft, NANO-Antivirus, SecureAge, Skyhigh (SWG), Trapmine, Trellix, VirIT, Zillya.</em></details>
